services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    restart: always
    tty: true
    stdin_open: true
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "4190:4190"
      - "110:110"
      - "995:995"
      - "127.0.0.1:8084:8080"
    expose:
      - "8080"
    volumes:
      - stalwart-data:/opt/stalwart
      - /etc/letsencrypt/live/mail.sigsensystems.com:/etc/stalwart/tls:ro
      - /root/stalwart-config.toml:/opt/stalwart/etc/config.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "printf 'GET / HTTP/1.1\r\nHost: localhost\r\n\r\n' >/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  stalwart-data: