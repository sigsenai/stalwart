services:
  stalwart-mail:
    image: stalwartlabs/mail-server:latest
    container_name: stalwart-mail
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "4190:4190"  # Sieve/Managesieve if needed
      - "110:110"
      - "995:995"
    volumes:
      - /path/to/stalwart/data:/opt/stalwart-mail  # persistent storage
    restart: always
    tty: true
    stdin_open: true