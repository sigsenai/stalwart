services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    restart: always
    tty: true
    stdin_open: true
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "4190:4190"
      - "110:110"
      - "995:995"
      - "127.0.0.1:8084:8080"
    expose:
      - "8080"
    volumes:
      - stalwart-data:/opt/stalwart
      - /etc/letsencrypt/live/mail.sigsensystems.com:/etc/stalwart/tls:ro
      - /root/stalwart-config.toml:/opt/stalwart/etc/config.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=5)\nPY"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  stalwart-data: