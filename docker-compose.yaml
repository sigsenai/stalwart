services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: stalwart-mail
    restart: always
    tty: true
    stdin_open: true

    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "4190:4190"
      - "110:110"
      - "995:995"

    expose:
      - "8080"

    volumes:
      - stalwart-data:/opt/stalwart
      - /etc/letsencrypt/live/mail.sigsensystems.com:/etc/stalwart/tls:ro
      - /root/stalwart-config.toml:/opt/stalwart/etc/config.toml:ro

volumes:
  stalwart-data: